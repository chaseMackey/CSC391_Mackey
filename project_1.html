<!DOCTYPE html>
<html>
  <head>
    <title>Project 1 - Fixed View</title>
    <script src="https://aframe.io"></script>
  </head>
  <body>
    <a-scene>
      <!-- Background -->
      <a-sky color="#222"></a-sky>

      <!-- Center Sphere (Red) -->
      <a-sphere position="0 1.25 -5" radius="1.5" color="red"></a-sphere>

      <!-- Orbiting Sphere (Blue) -->
      
        <a-sphere position="4 0 0" radius="0.5" color="blue"></a-sphere>
      

      <!-- FORCE THE CAMERA POSITION -->
      <!-- This places you 10 units back so you can't miss the objects -->
      
      
      <!-- Added light so objects aren't black -->
      <a-light type="directional" position="1 1 1"></a-light>
      <a-light type="ambient" color="#fff"></a-light>
    </a-scene>
  </body>
</html>
