<!DOCTYPE html>
<html>
  <head>
    <title>Project 2 - p5.js Test</title>
    <!-- Using a different, very stable library link -->
    <script src="https://jsdelivr.net"></script>
    <style>
      body { margin: 0; background: #111; overflow: hidden; }
    </style>
  </head>
  <body>
    <script>
      let x = 0;

      function setup() {
        // This creates the drawing area
        createCanvas(windowWidth, windowHeight);
        background(20);
      }

      function draw() {
        // Draw a dark background every frame to clear the screen
        background(20, 20); 

        // 1. Draw a white circle that follows your mouse
        fill(255);
        noStroke();
        circle(mouseX, mouseY, 50);

        // 2. Draw a red ball that moves automatically across the screen
        fill(255, 0, 0);
        circle(x, height / 2, 100);
        
        // Move the red ball
        x = x + 5;
        if (x > width) { x = 0; }
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
      }
    </script>
  </body>
</html>
